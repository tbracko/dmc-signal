<!DOCTYPE html>
<html lang="en" style="background:#07090d">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>DMS Signal · BTC</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;600&family=Sora:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#07090d;color:#dce8f5;font-family:'Sora',system-ui,sans-serif;min-height:100%;-webkit-text-size-adjust:100%}
body{padding-bottom:calc(68px + env(safe-area-inset-bottom,0px));overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,230,118,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(0,230,118,.015) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}

/* TOP BAR */
.topbar{position:sticky;top:0;z-index:100;background:#07090df5;border-bottom:1px solid #1a2230;padding:calc(env(safe-area-inset-top,0px) + 10px) 16px 10px;display:flex;align-items:center;gap:10px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.brand{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:.1em;color:#00e676;line-height:1;flex-shrink:0}
.pair{font-family:'IBM Plex Mono',monospace;font-size:10px;color:#5d7a99;background:#10151c;border:1px solid #1a2230;padding:3px 8px;border-radius:4px}
.topbar-r{margin-left:auto;display:flex;align-items:center;gap:8px}
#tb-price{font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:600;color:#dce8f5}
#tb-chg{font-family:'IBM Plex Mono',monospace;font-size:12px;padding:3px 8px;border-radius:4px;background:rgba(0,230,118,.15);color:#00e676;min-width:55px;text-align:center}
#dot{width:8px;height:8px;border-radius:50%;background:#999;animation:pulse 2s infinite;margin-left:6px}
@keyframes pulse{0%{opacity:1}50%{opacity:.3}100%{opacity:1}}
.topbar-btn{width:32px;height:32px;border:none;background:transparent;color:#7b8fa8;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:6px;transition:all .2s}
.topbar-btn:hover{background:rgba(123,143,168,.1);color:#dce8f5}
.topbar-btn svg{width:18px;height:18px;stroke-width:1.5}

/* NOTIFICATION BADGE */
.notif-badge{position:absolute;width:6px;height:6px;background:#ff3d5a;border-radius:50%;top:-2px;right:-2px}

/* PERSISTENT ALERT */
.persistent-alert{background:rgba(255,152,0,.1);border:1px solid rgba(255,152,0,.2);border-radius:8px;padding:10px 12px;margin:12px 16px 0;display:none;align-items:center;gap:8px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:#ff9800;animation:slideDown .3s}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.persistent-alert-text{flex:1}
.persistent-alert-btn{background:transparent;border:none;color:#ff9800;cursor:pointer;padding:4px;font-size:14px}

/* PAGES */
.pages{position:relative;min-height:calc(100vh - 60px)}
.page{display:none}
.page.active{display:block}

/* COIN SELECTOR */
.coin-sel{font-family:'IBM Plex Mono',monospace;font-size:12px;padding:6px 10px;background:#10151c;border:1px solid #1a2230;color:#dce8f5;border-radius:4px;cursor:pointer}
.coin-sel:hover{border-color:#00e676}

/* HERO CARD */
.hero{background:linear-gradient(135deg,rgba(7,9,13,.5) 0%,rgba(15,21,31,.8) 100%);border:1px solid #1a2230;border-radius:12px;padding:16px;margin:16px;display:flex;flex-direction:column;gap:12px;transition:all .3s}
.hero.long{border-color:rgba(0,230,118,.3);background:linear-gradient(135deg,rgba(0,230,118,.05) 0%,rgba(0,230,118,.02) 100%)}
.hero.short{border-color:rgba(255,61,90,.3);background:linear-gradient(135deg,rgba(255,61,90,.05) 0%,rgba(255,61,90,.02) 100%)}
.hero.neutral{border-color:rgba(255,193,7,.2);background:linear-gradient(135deg,rgba(255,193,7,.02) 0%,rgba(255,193,7,.01) 100%)}
.hero-top{display:flex;align-items:baseline;gap:12px}
.hero-dir{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:.05em;line-height:1}
.hero.long .hero-dir{color:#00e676}
.hero.short .hero-dir{color:#ff3d5a}
.hero.neutral .hero-dir{color:#ffc107}
.hero-meta{display:flex;gap:8px;font-family:'IBM Plex Mono',monospace;font-size:10px;color:#5d7a99}
.hero-conf{font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:600;color:#7b8fa8}
.hero-conf.high{color:#00e676}
.hero-conf.med{color:#ffc107}
.hero-conflbl{font-size:10px;color:#5d7a99}
.hero-conflict{border:1px solid rgba(255,152,0,.3);background:rgba(255,152,0,.05);border-radius:8px;padding:10px;font-family:'IBM Plex Mono',monospace;font-size:10px;color:#ff9800;line-height:1.4}
.hero-conflict.strong{border-color:rgba(255,61,90,.3);background:rgba(255,61,90,.05);color:#ff6b6b}
.hero-reason{font-family:'IBM Plex Mono',monospace;font-size:11px;color:#5d7a99;line-height:1.4;padding:8px;background:rgba(93,122,153,.05);border-radius:6px}

/* CONVICTION GAUGE */
.conviction-gauge{display:flex;align-items:center;gap:12px;padding:12px 0}
.conviction-bar{flex:1;height:6px;background:#1a2230;border-radius:3px;overflow:hidden}
.conviction-fill{height:100%;background:#ffc107;transition:all .5s}
.conviction-fill.strong-bullish{background:#00e676;width:100%}
.conviction-fill.bullish{background:#00e676;width:70%}
.conviction-fill.weak-bullish{background:#7ed321;width:40%}
.conviction-fill.neutral{background:#5d7a99;width:50%}
.conviction-fill.weak-bearish{background:#ff9800;width:60%}
.conviction-fill.bearish{background:#ff3d5a;width:75%}
.conviction-fill.strong-bearish{background:#d32f2f;width:100%}
.conviction-label{font-family:'IBM Plex Mono',monospace;font-size:10px;color:#7b8fa8;min-width:45px;text-align:right}

/* COLLAPSED HTF CARDS */
.htf-summary{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.htf-chip{display:flex;align-items:center;gap:6px;padding:6px 10px;background:#1a2230;border:1px solid #2a3a50;border-radius:6px;cursor:pointer;transition:all .2s;font-family:'IBM Plex Mono',monospace;font-size:10px;color:#7b8fa8}
.htf-chip:hover{border-color:#00e676}
.htf-chip-tf{font-weight:600;color:#dce8f5;min-width:30px}
.htf-chip-icon{font-size:12px}
.htf-chip-type{font-size:8px;color:#5d7a99}

/* EXPANDED HTF CARDS */
.tfc{background:linear-gradient(135deg,rgba(15,21,31,.6) 0%,rgba(20,28,40,.4) 100%);border:1px solid #1a2230;border-radius:10px;padding:12px;margin:0 16px 10px;transition:all .2s}
.tfc.long{border-color:rgba(0,230,118,.2)}
.tfc.short{border-color:rgba(255,61,90,.2)}
.tfc-head{display:flex;align-items:center;gap:8px;font-family:'IBM Plex Mono',monospace;font-size:11px}
.tfc-tf{font-weight:600;color:#dce8f5;min-width:35px}
.tfc-type{padding:2px 6px;border-radius:4px;font-size:9px;font-weight:600;letter-spacing:.05em}
.tfc-type.FAIL_GAIN{background:rgba(255,61,90,.15);color:#ff3d5a}
.tfc-type.FAIL_LOSE{background:rgba(0,230,118,.15);color:#00e676}
.tfc-type.BLIND_ENTRY{background:rgba(255,193,7,.15);color:#ffc107}
.tfc-type.BREAKOUT{background:rgba(100,181,246,.15);color:#64b5f6}
.tfc-type.AT_LEVEL{background:rgba(156,39,176,.15);color:#ba68c8}
.tfc-type.NONE{background:rgba(93,122,153,.1);color:#5d7a99}
.tfc-type.COUNTER_TREND{background:rgba(255,152,0,.15);color:#ff9800}
.tfc-sig{font-weight:600}
.tfc-sig.LONG{color:#00e676}
.tfc-sig.SHORT{color:#ff3d5a}
.tfc-reason{font-family:'IBM Plex Mono',monospace;font-size:10px;color:#7b8fa8;line-height:1.4;margin-top:6px}
.tfc-prices{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;font-family:'IBM Plex Mono',monospace;font-size:9px}
.tcp{display:flex;gap:4px;padding:4px 8px;background:rgba(93,122,153,.05);border-radius:4px;color:#7b8fa8}
.tcp-l{color:#5d7a99}

/* TRADING SECTION (Open Trades) */
.trades-section{margin:16px;display:none}
.trades-section.active{display:block}
.trades-head{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:.1em;color:#dce8f5;margin-bottom:10px}
.trade-item{background:#1a2230;border:1px solid #2a3a50;border-radius:8px;padding:10px;margin-bottom:8px;display:flex;flex-direction:column;gap:8px}
.trade-header{display:flex;align-items:center;gap:8px;font-family:'IBM Plex Mono',monospace;font-size:11px}
.trade-badge{padding:2px 6px;background:rgba(0,230,118,.15);color:#00e676;border-radius:4px;font-weight:600;font-size:9px}
.trade-badge.short{background:rgba(255,61,90,.15);color:#ff3d5a}
.trade-pl{margin-left:auto;font-weight:600;font-size:12px}
.trade-pl.positive{color:#00e676}
.trade-pl.negative{color:#ff3d5a}
.trade-distance{display:flex;gap:10px;font-family:'IBM Plex Mono',monospace;font-size:10px;color:#7b8fa8}
.trade-dist-item{display:flex;gap:4px}
.trade-dist-label{color:#5d7a99}

/* LEVELS PAGE - PRICE LADDER */
.lvl-list{margin:16px}
.lvl-item{background:#1a2230;border:1px solid #2a3a50;border-radius:8px;padding:10px;margin-bottom:8px;display:flex;align-items:center;gap:10px;transition:all .2s}
.lvl-item:hover{border-color:rgba(0,230,118,.2)}
.lvl-item.untested{opacity:.6}
.lvl-badge{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;padding:4px 8px;border-radius:4px;min-width:45px;text-align:center}
.lvl-badge.R{background:rgba(255,61,90,.15);color:#ff3d5a}
.lvl-badge.S{background:rgba(0,230,118,.15);color:#00e676}
.lvl-info{flex:1;display:flex;flex-direction:column;gap:4px}
.lvl-tf{font-family:'IBM Plex Mono',monospace;font-size:10px;color:#5d7a99;display:flex;align-items:center;gap:6px}
.lvl-untag{background:rgba(255,152,0,.15);color:#ff9800;padding:2px 4px;border-radius:3px;font-size:8px;margin-left:auto}
.lvl-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.lvl-price{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600}
.lvl-price.R{color:#ff3d5a}
.lvl-price.S{color:#00e676}
.lvl-dist{font-family:'IBM Plex Mono',monospace;font-size:9px;color:#5d7a99}

/* PRICE LADDER VISUALIZATION */
.price-ladder{margin:16px;background:#1a2230;border:1px solid #2a3a50;border-radius:8px;padding:12px;margin-bottom:16px;display:none}
.price-ladder.active{display:block}
.ladder-track{height:150px;background:linear-gradient(180deg,rgba(255,61,90,.1) 0%,rgba(93,122,153,.05) 50%,rgba(0,230,118,.1) 100%);border-radius:6px;position:relative;border:1px solid rgba(0,230,118,.1)}
.ladder-level{position:absolute;width:100%;height:1px;background:rgba(93,122,153,.3);left:0;display:flex;align-items:center}
.ladder-level.current{background:#ffc107;height:2px;z-index:10}
.ladder-level.current::before{content:'●';position:absolute;left:8px;top:-4px;color:#ffc107;font-size:9px}
.ladder-level.support{background:rgba(0,230,118,.2)}
.ladder-level.resistance{background:rgba(255,61,90,.2)}
.ladder-price{position:absolute;right:8px;font-family:'IBM Plex Mono',monospace;font-size:8px;color:#5d7a99;transform:translateY(-50%);white-space:nowrap}

/* EMPTY STATE */
.empty{text-align:center;padding:30px 16px;color:#5d7a99;font-family:'IBM Plex Mono',monospace;font-size:12px}

/* SIGNAL LOG */
.log-item{background:linear-gradient(135deg,rgba(15,21,31,.6) 0%,rgba(20,28,40,.4) 100%);border:1px solid #1a2230;border-radius:10px;padding:12px;margin:0 16px 10px;transition:all .2s}
.log-item.long{border-color:rgba(0,230,118,.2)}
.log-item.short{border-color:rgba(255,61,90,.2)}
.log-head{display:flex;align-items:center;gap:6px;font-family:'IBM Plex Mono',monospace;font-size:11px;flex-wrap:wrap}
.log-coin{font-size:9px;font-weight:700;letter-spacing:.06em;background:#1a2230;padding:2px 5px;border-radius:3px;color:#7b8fa8}
.log-sig{font-weight:600}
.log-sig.LONG{color:#00e676}
.log-sig.SHORT{color:#ff3d5a}
.log-tf{color:#5d7a99}
.log-status{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:600}
.log-status.open{background:rgba(0,230,118,.15);color:#00e676}
.log-status.hit{background:rgba(0,230,118,.15);color:#00e676}
.log-status.stopped{background:rgba(255,61,90,.15);color:#ff3d5a}
.log-status.review_exit{background:rgba(255,152,0,.15);color:#ff9800}
.log-prices{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;font-family:'IBM Plex Mono',monospace;font-size:9px}
.log-p{display:flex;gap:4px;padding:4px 8px;background:rgba(93,122,153,.05);border-radius:4px;color:#7b8fa8}
.log-pl{color:#5d7a99}
.log-reason{font-family:'IBM Plex Mono',monospace;font-size:10px;color:#7b8fa8;line-height:1.4;margin-top:6px}
.log-time2{color:#5d7a99;margin-left:auto;font-size:10px}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin:16px;margin-bottom:32px}
.stat-card{background:#1a2230;border:1px solid #2a3a50;border-radius:8px;padding:12px;display:flex;flex-direction:column;gap:8px}
.stat-label{font-family:'IBM Plex Mono',monospace;font-size:10px;color:#5d7a99;text-transform:uppercase;letter-spacing:.05em}
.stat-value{font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:600;color:#dce8f5}
.stat-value.green{color:#00e676}
.stat-value.red{color:#ff3d5a}
.stat-detail{font-family:'IBM Plex Mono',monospace;font-size:9px;color:#5d7a99;margin-top:4px}

/* SETTINGS MODAL */
.settings-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:none;z-index:200;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.settings-overlay.active{display:block}
.settings-panel{position:fixed;bottom:0;left:0;right:0;background:#0a0c10;border-top:1px solid #1a2230;border-radius:16px 16px 0 0;padding:20px 16px;padding-bottom:calc(16px + env(safe-area-inset-bottom,0px));max-height:90vh;overflow-y:auto;animation:slideUp .3s;z-index:201}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.settings-close{position:absolute;top:12px;right:12px;width:32px;height:32px;border:none;background:transparent;color:#7b8fa8;cursor:pointer;font-size:24px;display:flex;align-items:center;justify-content:center}
.settings-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.1em;color:#dce8f5;margin-bottom:16px}
.settings-group{margin-bottom:20px}
.settings-label{font-family:'IBM Plex Mono',monospace;font-size:11px;color:#5d7a99;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;display:block}
.settings-input{width:100%;padding:8px;background:#1a2230;border:1px solid #2a3a50;color:#dce8f5;border-radius:4px;font-family:'IBM Plex Mono',monospace;font-size:12px}
.settings-input:focus{outline:none;border-color:#00e676;background:#10151c}
.settings-checkbox{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.settings-checkbox input{cursor:pointer}
.settings-checkbox label{cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:11px;color:#7b8fa8;flex:1}
.settings-button{width:100%;padding:10px;background:#00e676;color:#000;border:none;border-radius:6px;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;cursor:pointer;transition:all .2s}
.settings-button:hover{background:#00ff7f}
.settings-button.secondary{background:transparent;border:1px solid #00e676;color:#00e676;margin-top:8px}
.settings-status{font-family:'IBM Plex Mono',monospace;font-size:10px;color:#ff9800;margin-top:8px;text-align:center}

/* BOTTOM NAV */
nav{position:fixed;bottom:0;left:0;right:0;background:#07090df5;border-top:1px solid #1a2230;display:flex;gap:0;justify-content:space-around;padding:0;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);z-index:99;padding-bottom:env(safe-area-inset-bottom,0px)}
.nb{flex:1;padding:calc(12px + env(safe-area-inset-bottom,0px)/3) 12px 12px;border:none;background:transparent;color:#5d7a99;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.05em;transition:all .2s;position:relative}
.nb:hover{color:#dce8f5}
.nb.active{color:#00e676}
.nb svg{width:20px;height:20px;stroke-width:1.5}

/* SKELETON */
.skel{background:linear-gradient(90deg,#1a2230 0%,#2a3a50 50%,#1a2230 100%);background-size:200% 100%;animation:shimmer 1.5s infinite;display:inline-block}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* UTILITIES */
.hidden{display:none!important}
.flex{display:flex}
.gap-8{gap:8px}

/* MODALS */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;z-index:300}
.modal.active{display:flex}
.modal-content{background:#0a0c10;border:1px solid #1a2230;border-radius:12px;padding:20px;max-width:90vw;max-height:90vh;overflow-y:auto}
.modal-close{position:absolute;top:12px;right:12px;width:32px;height:32px;border:none;background:transparent;color:#7b8fa8;cursor:pointer;font-size:24px}

@media(min-width:768px){
  .stats-grid{grid-template-columns:repeat(4,1fr)}
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="brand">DMS Signal</div>
  <select id="coin-sel" class="coin-sel" onchange="switchCoin(this.value)">
    <option value="bitcoin">BTC/USD</option>
    <option value="ethereum">ETH/USD</option>
    <option value="solana">SOL/USD</option>
  </select>
  <div class="pair" id="pair-label">BINANCE:BTCUSDT</div>
  <div class="topbar-r">
    <div id="tb-price" style="font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:600;">$—</div>
    <div id="tb-chg" style="font-family:'IBM Plex Mono',monospace;font-size:12px;padding:3px 8px;border-radius:4px;background:rgba(0,230,118,.15);color:#00e676;min-width:55px;text-align:center;display:none">—</div>
    <div id="dot" style="width:8px;height:8px;border-radius:50%;background:#999;margin-left:6px"></div>
    <button class="topbar-btn" id="settings-btn" onclick="openSettings()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>
</div>

<!-- PERSISTENT ALERT -->
<div class="persistent-alert" id="persistent-alert">
  <div class="persistent-alert-text" id="persistent-alert-text"></div>
  <button class="persistent-alert-btn" onclick="dismissPersistentAlert()">✕</button>
</div>

<!-- PAGES -->
<div class="pages">

  <!-- SIGNAL PAGE -->
  <div class="page active" id="page-signal">
    <div id="session-banner" style="margin:12px 16px 0;font-family:'IBM Plex Mono',monospace;font-size:10px;padding:10px 12px;background:rgba(100,181,246,.05);border:1px solid rgba(100,181,246,.2);border-radius:8px;color:#64b5f6;line-height:1.4;display:none"></div>

    <!-- HERO: 15m Signal -->
    <div class="hero neutral" id="hero">
      <div class="hero-top">
        <div class="hero-dir" id="hero-dir">NEUTRAL</div>
        <div>
          <div class="hero-conf" id="hero-conf">—</div>
          <div class="hero-conflbl" id="hero-conflbl">CONF</div>

// ── API ──────────────────────────────────────────────────────
async function bnKlines(sym, interval, limit){

    h: parseFloat(k[2]),
    l: parseFloat(k[3]),
    c: parseFloat(k[4]),
    v: parseFloat(k[7]),
    bh: Math.max(parseFloat(k[1]), parseFloat(k[4])),
    bl: Math.min(parseFloat(k[1]), parseFloat(k[4])),
  }));
}

// ── CORE LOGIC (from v1) ────────────────────────────────────
function bodySize(k){ return Math.abs(k.bh - k.bl); }

function isSwingHigh(c, i, N=3){
  if(i<N || i>=c.length-N) return false;
  for(let j=1; j<=N; j++){
    if(c[i].h <= c[i-j].h || c[i].h <= c[i+j].h) return false;
  }
  return true;
}

function isSwingLow(c, i, N=3){
  if(i<N || i>=c.length-N) return false;
  for(let j=1; j<=N; j++){
    if(c[i].l >= c[i-j].l || c[i].l >= c[i+j].l) return false;
  }
  return true;
}

function atr(c, p=14){
  if(c.length<p) return 0;
  let sum=0;
  for(let i=c.length-p; i<c.length; i++){
    const tr=Math.max(c[i].h-c[i].l, Math.abs(c[i].h-c[i-1].c), Math.abs(c[i].l-c[i-1].c));
    sum+=tr;
  }
  return sum/p;
}

function scoreLevel(c, i, type){
  let score=0;
  const range=c[i].h - c[i].l;
  score += Math.max(0, Math.min(25, range * 100)); // Body size
  const closePos = (c[i].c - c[i].l) / (c[i].h - c[i].l);
  if(type==='R' && closePos < 0.3) score += 15;
  if(type==='S' && closePos > 0.7) score += 15;
  return Math.round(score);
}

function classifyStrength(score, range, wick){
  if(score>=60) return 'strong';
  if(score>=40) return 'med';
  return 'weak';
}

function countLevelTests(c, startIdx, bh, bl, type){
  let count=0;
  for(let i=startIdx; i<c.length; i++){
    if(type==='R' && c[i].h >= bh*0.9975) count++;
    if(type==='S' && c[i].l <= bl*1.0025) count++;
  }
  return count;
}

function isLevelTested(c, startIdx, bh, bl, type){
  for(let i=startIdx; i<c.length; i++){
    if(type==='R' && c[i].h >= bh*0.9975) return true;
    if(type==='S' && c[i].l <= bl*1.0025) return true;
  }
  return false;
}

function getSessionBoundaries(){
  const now=new Date();
  const utc=new Date(now.getTime()+now.getTimezoneOffset()*60000);
  const london=(utc.getTime()<=utc.getTime()+3600000)?utc.getHours():utc.getHours();
  const ny=utc.getHours()-5;
  const tokyo=utc.getHours()+9;
  return {london,ny,tokyo};
}

function getCurrentSession(){
  const b=getSessionBoundaries();
  const h=b.london;
  if(h>=8 && h<12) return 'LONDON_OPEN';
  if(h>=12 && h<16) return 'LONDON_CLOSE';
  if(h>=16 && h<22) return 'NY_OPEN';
  if(h>=22 || h<8) return 'NY_CLOSE_ASIA';
  return 'UNCLEAR';
}

function findVPeaks(c, tf){
  const peaks=[];
  for(let i=2; i<c.length-2; i++){
    if(isSwingHigh(c,i,2)){
      peaks.push({type:'R',idx:i,price:c[i].h});
    }
    if(isSwingLow(c,i,2)){
      peaks.push({type:'S',idx:i,price:c[i].l});
    }
  }
  return peaks.reverse().slice(0,10);
}

function findPDHL(dCandles){
  if(!dCandles || dCandles.length<5) return {pdh:0,pdl:0};
  const p=dCandles[dCandles.length-2]; // Previous day
  return {pdh:p.h, pdl:p.l};
}

function detectFlippedLevel(c, formationIdx, originalType, levelPrice){
  if(formationIdx >= c.length-1) return null;
  const wick=originalType==='R'?c[formationIdx].l:c[formationIdx].h;
  const violation=originalType==='R'?(wick < levelPrice):(wick > levelPrice);
  if(!violation) return null;
  const threshold=levelPrice*0.002;
  const reversal=originalType==='R'?(c[formationIdx].h > levelPrice+threshold):(c[formationIdx].l < levelPrice-threshold);
  if(reversal) return originalType==='R'?'flipped_support':'flipped_resistance';
  return null;
}

// ── SESSION / RANGE LOGIC ────────────────────────────────────
function getAsiaRange(candles15m){
  const now=new Date();
  const asiaStart=new Date(now);
  asiaStart.setUTCHours(0,0,0,0);
  const asiaEnd=new Date(asiaStart);
  asiaEnd.setUTCHours(8,0,0,0);
  const filtered=candles15m.filter(k=>k.t>=asiaStart.getTime()&&k.t<asiaEnd.getTime());
  if(!filtered.length) return {h:0,l:0,range:0};
  return {h:Math.max(...filtered.map(k=>k.h)),l:Math.min(...filtered.map(k=>k.l)),range:Math.max(...filtered.map(k=>k.h))-Math.min(...filtered.map(k=>k.l))};
}

function getAsiaLevels(candles15m){
  const asia=getAsiaRange(candles15m);
  const peaks=findVPeaks(candles15m,'15m').filter(p=>p.price<=asia.h&&p.price>=asia.l);
  return peaks.slice(0,3);
}

function getNYRange(candles15m){
  const now=new Date();
  const nyStart=new Date(now);

}

// ── DMS ENGINE (15m Signal) ──────────────────────────────────
function findDMCLevels(c, dCandles, tf, asiaLevels){
  const peaks=findVPeaks(c, tf);
  const levels=[];
  for(let p of peaks){
    const tested=isLevelTested(c, 0, p.price, p.price, p.type);
    let flipped=null;
    for(let i=1; i<3&&i<c.length; i++){
      const det=detectFlippedLevel(c, c.length-1-i, p.type, p.price);
      if(det){flipped=det;break;}
    }
    const score=scoreLevel(c, p.idx, p.type);
    let strength='weak';
    if(score>=60) strength='strong';
    else if(score>=40) strength='med';
    let bonus=0;
    for(let a of asiaLevels){
      if(Math.abs(a.price - p.price) < p.price*0.005) bonus+=15;
    }
    score+=bonus;
    let isFlipped=false;
    if(flipped){
      const score_mult = flipped.includes('flipped') ? 1.5 : 1;
      isFlipped=true;
    }
    levels.push({...p, tested, score, strength, flipped, isFlipped});
  }
  return levels.sort((a,b)=>b.score-a.score);
}

function findNextLevel(levels, currentPrice, direction){
  const filtered=levels.filter(l=>direction==='LONG'?l.price<currentPrice:l.price>currentPrice);
  return filtered.length ? filtered[0] : null;
}

function calcRR(entry, target, trapLevel, stopLevel){
  if(!entry||!target||!stopLevel) return 0;
  const rr=Math.abs(target-entry)/Math.abs(stopLevel-entry);
  return parseFloat(rr.toFixed(2));
}

function findStopLevel(levels, trapPrice, direction){
  const filtered=levels.filter(l=>direction==='LONG'?l.price<trapPrice:l.price>trapPrice);
  if(!filtered.length) return direction==='LONG'?trapPrice*0.98:trapPrice*1.02;
  return filtered[0].price;
}

function dms(c, a, dCandles, tf, htfBias){
  if(!c||c.length<10) return {sig:'NEUTRAL',type:'NONE',reason:'Insufficient candles',level:null,target:null,stopPrice:null,rr:0};

  const now=new Date();
  const current=c[c.length-1];
  const prev=c[c.length-2];
  const asiaLevels=getAsiaLevels(c);
  const levels=findDMCLevels(c, dCandles, tf, asiaLevels);
  const pdh=dCandles&&dCandles.length?dCandles[dCandles.length-1].h:0;
  const pdl=dCandles&&dCandles.length?dCandles[dCandles.length-1].l:0;

  if(!levels.length) return {sig:'NEUTRAL',type:'NONE',reason:'No V-peaks detected',level:null,target:null,stopPrice:null,rr:0};

  const nextLevel=findNextLevel(levels, current.c, 'SHORT');
  const nextLevelLong=findNextLevel(levels, current.c, 'LONG');

  // FAIL_GAIN: SHORT when price fails to gain new high / tested resistance
  if(nextLevel && nextLevel.type==='R' && nextLevel.tested && nextLevel.score>=40){
    const target=levels.find(l=>l.type==='S'&&l.price<nextLevel.price);
    const stopLevel=findStopLevel(levels, nextLevel.price, 'SHORT');
    const rr=calcRR(current.c, target?.price, nextLevel.price, stopLevel);
    const reason=`FAIL GAIN setup: price rejected at $${fmt(nextLevel.price)} resistance`;

    // Soft HTF block: if SHORT conflicts with HTF LONG bias, flag but don't block
    let typeLabel='FAIL_GAIN';
    if(htfBias==='UP'){
      const hardBlock=localStorage.getItem('alert_hardblock')!=='false';
      if(hardBlock) return {sig:'NEUTRAL',type:'NONE',reason:'Soft blocked: HTF bias is UP',level:null,target:null,stopPrice:null,rr:0};
      typeLabel='FAIL_GAIN';
    }

    return {sig:'SHORT',type:typeLabel,reason,level:nextLevel.price,target:target?.price||0,stopPrice:stopLevel,rr,strength:nextLevel.strength,detail:`Score: ${nextLevel.score}${nextLevel.isFlipped?' · FLIPPED level (1.5x probability)':''}`};
  }

  // FAIL_LOSE: LONG when price fails to make new low / tested support
  if(nextLevelLong && nextLevelLong.type==='S' && nextLevelLong.tested && nextLevelLong.score>=40){
    const target=levels.find(l=>l.type==='R'&&l.price>nextLevelLong.price);
    const stopLevel=findStopLevel(levels, nextLevelLong.price, 'LONG');
    const rr=calcRR(current.c, target?.price, nextLevelLong.price, stopLevel);
    const reason=`FAIL LOSE setup: price rejected at $${fmt(nextLevelLong.price)} support`;

    let typeLabel='FAIL_LOSE';
    if(htfBias==='DOWN'){
      const hardBlock=localStorage.getItem('alert_hardblock')!=='false';
      if(hardBlock) return {sig:'NEUTRAL',type:'NONE',reason:'Soft blocked: HTF bias is DOWN',level:null,target:null,stopPrice:null,rr:0};
      typeLabel='FAIL_LOSE';
    }

    return {sig:'LONG',type:typeLabel,reason,level:nextLevelLong.price,target:target?.price||0,stopPrice:stopLevel,rr,strength:nextLevelLong.strength,detail:`Score: ${nextLevelLong.score}${nextLevelLong.isFlipped?' · FLIPPED level (1.5x probability)':''}`};
  }

  // BLIND_ENTRY: initiate longs at support
  if(nextLevelLong && nextLevelLong.type==='S' && nextLevelLong.score>=50){
    const target=levels.find(l=>l.type==='R'&&l.price>nextLevelLong.price);
    const reason=`Blind entry at support $${fmt(nextLevelLong.price)}`;
    return {sig:'LONG',type:'BLIND_ENTRY',reason,level:nextLevelLong.price,target:target?.price||0,stopPrice:nextLevelLong.price*0.99,rr:0,strength:nextLevelLong.strength};
  }

  return {sig:'NEUTRAL',type:'NONE',reason:'No high-probability setup',level:null,target:null,stopPrice:null,rr:0};
}

// ── HTF DIRECTION ────────────────────────────────────────────
async function determineHTFDirection(coinId){
  const h1=await getCandles('1H', coinId);
  const h4=await getCandles('4H', coinId);
  if(h1.length<5 || h4.length<5) return 'UNCLEAR';
  const h1Sig=dms(h1, null, 'h1', 'UNCLEAR');
  const h4Sig=dms(h4, null, 'h4', 'UNCLEAR');
  if(h1Sig.sig==='LONG' && h4Sig.sig==='LONG') return 'UP';
  if(h1Sig.sig==='SHORT' && h4Sig.sig==='SHORT') return 'DOWN';
  return 'MIXED';
}

// ── CONVICTION SCORE ────────────────────────────────────────
function buildConvictionScore(c, h1, h4, h1C, h4C){
  let score = 0;
  const current = c[c.length-1];
  const prev = c[c.length-2];

  // 15m candle quality: close position
  const closePos = (current.c - current.l) / (current.h - current.l);
  if(closePos > 0.7) score += 3;
  if(closePos < 0.3) score -= 3;

  // HTF alignment
  if(h1C && h1C.sig === 'LONG') score += 2;
  if(h1C && h1C.sig === 'SHORT') score -= 2;
  if(h4C && h4C.sig === 'LONG') score += 3;
  if(h4C && h4C.sig === 'SHORT') score -= 3;

  // Body size
  const bodySize = Math.abs(current.c - current.o);
  if(bodySize > current.c * 0.002) score += 1;

  return Math.max(-10, Math.min(10, Math.round(score)));
}

function renderConvictionGauge(score){
  const fill = document.getElementById('conviction-fill');
  const label = document.getElementById('conviction-label');
  label.textContent = score;

  fill.className = 'conviction-fill';
  if(score >= 8) fill.classList.add('strong-bullish');
  else if(score >= 5) fill.classList.add('bullish');
  else if(score >= 2) fill.classList.add('weak-bullish');
  else if(score <= -8) fill.classList.add('strong-bearish');
  else if(score <= -5) fill.classList.add('bearish');
  else if(score <= -2) fill.classList.add('weak-bearish');
  else fill.classList.add('neutral');

  const pct = ((score + 10) / 20) * 100;
  fill.style.width = pct + '%';
}

function loadDedup(){ try{ return JSON.parse(localStorage.getItem(DEDUP_KEY)||'{}'); }catch{ return {}; } }
function saveDedup(d){ localStorage.setItem(DEDUP_KEY, JSON.stringify(d)); }

function isDedupSuppressed(coinId, tf, type, level){
  const d = loadDedup();
  const key = `${coinId}:${tf}:${type}:${Math.round(level)}`;
  const window = type === 'BLIND_ENTRY' ? 28800000 : 14400000;
  const now = Date.now();
  let changed = false;
  for(const k of Object.keys(d)){ if(now - d[k] > 28800000){ delete d[k]; changed=true; } }
  if(changed) saveDedup(d);
  return d[key] && (now - d[key]) < window;
}

function markDedupFired(coinId, tf, type, level){
  const d = loadDedup();
  const key = `${coinId}:${tf}:${type}:${Math.round(level)}`;
  d[key] = Date.now();
  saveDedup(d);
}

const MAX_LOG = 50;

function loadLog(){
  try{ return JSON.parse(localStorage.getItem(LOG_KEY)||'[]'); }catch{ return []; }
}

function saveLog(entries){ localStorage.setItem(LOG_KEY, JSON.stringify(entries)); }

function addLog(sig, tf, reason, type, level, target, rr, stopPrice, coinId){
  coinId = coinId || activeCoin;
  if(type==='NONE') return;
  const entries = loadLog();
  const now = new Date();
  const dateStr = now.toLocaleDateString('en-GB',{day:'2-digit',month:'short'});
  const timeStr = now.toTimeString().slice(0,5);

  const window4h = 14400000;
  const recentDup = entries.slice(0,20).find(e =>
    e.sig === sig && e.tf === tf && e.coin === coinId && e.type === type
    && Math.abs((e.level||0) - (level||0)) < level * 0.005
    && (now - new Date(e.ts)) < window4h
  );
  if(recentDup) return;

  const s = coinState[coinId];
  const entry = {
    id: now.getTime(),
    ts: now.toISOString(),
    date: dateStr,
    time: timeStr,
    coin: coinId,
    sig, tf, type, level, target, rr,
    stopPrice: stopPrice || null,
    reason: reason.slice(0,120),
    entryPrice: s ? s.price : price,
    status: 'open'
  };

  if(sig === 'LONG' || sig === 'SHORT'){
    const opposite = sig === 'LONG' ? 'SHORT' : 'LONG';
    entries.forEach(e => {
      if(e.sig === opposite && e.status === 'open' && e.coin === coinId){
        e.status = 'review_exit';
        e.exitNote = `⚠ ${sig} signal fired on ${tf} — consider exiting this ${opposite}`;
      }
    });
  }

  entries.unshift(entry);
  if(entries.length > MAX_LOG) entries.pop();
  saveLog(entries);
  renderLog();
}

  const entries = loadLog();

// ── POSITION SIZING ──────────────────────────────────────────
function calculatePositionSize(entryPrice, stopPrice, targetPrice){
  const useSize=localStorage.getItem('use_position_sizer')==='true';
  if(!useSize) return {riskAmount:0, rewardAmount:0, positionSize:0};

  const accountSize=parseFloat(localStorage.getItem('account_size')||'10000');
  const riskPercent=parseFloat(localStorage.getItem('risk_percent')||'1')/100;
  const riskAmount=accountSize * riskPercent;

  const risk=Math.abs(entryPrice - stopPrice);
  const reward=Math.abs(targetPrice - entryPrice);
  const posSize=riskAmount / risk;
  const rewardAmount=posSize * reward;

  return {riskAmount, rewardAmount, positionSize:Math.round(posSize)};
}

// ── AUTO-OUTCOME DETECTION ───────────────────────────────────
function checkAutoOutcomes(coinId){
  const s = coinState[coinId];
  if(!s || s.price <= 0) return;
  const entries = loadLog();
  let changed = false;

  entries.forEach(e => {
    if(e.status !== 'open') return;
    if(e.coin !== coinId) return;
    if(!e.target && !e.stopPrice) return;

    const p = s.price;
    if(e.sig === 'LONG'){
      if(e.target && p >= e.target){
        e.status = 'hit';
        e.exitNote = `✓ Auto: TP hit at $${fmt(p)}`;
        changed = true;
      } else if(e.stopPrice && p <= e.stopPrice){
        e.status = 'stopped';
        e.exitNote = `✗ Auto: SL hit at $${fmt(p)}`;
        changed = true;
      }
    } else if(e.sig === 'SHORT'){
      if(e.target && p <= e.target){
        e.status = 'hit';
        e.exitNote = `✓ Auto: TP hit at $${fmt(p)}`;
        changed = true;
      } else if(e.stopPrice && p >= e.stopPrice){
        e.status = 'stopped';
        e.exitNote = `✗ Auto: SL hit at $${fmt(p)}`;
        changed = true;
      }
    }
  });

  if(changed){ saveLog(entries); renderLog(); }
}

// ── BUILDSTORY: SESSION LEVEL INTERACTION TRACKER ──────────
function buildStory(levels, h4C, h1C, currentPrice){
  if(!levels || !levels.length || !h4C || !h1C) return null;
  if(h4C.length < 4 || h1C.length < 4) return null;

  const nearby = levels
    .filter(l => Math.abs(l.price - currentPrice)/currentPrice < 0.06 && l.score >= 20)
    .sort((a,b) => b.score - a.score)
    .slice(0, 6);

  if(nearby.length < 2) return null;

  const rows = [];
  let bullPoints = 0, bearPoints = 0;

  const h1Recent = h1C.slice(-12);
  const h4Recent = h4C.slice(-6);

  for(const lv of nearby){
    const tol = lv.price * 0.004;
    const isRes = lv.type === 'R';

    let h4GainCount = 0, h4FailCount = 0;
    for(const k of h4Recent){
      const touched = isRes
        ? (k.h >= lv.price - tol)
        : (k.l <= lv.price + tol);

      if(!touched) continue;

      const gained = isRes
        ? (k.bh > lv.price + tol)
        : (k.bl < lv.price - tol);
      const failed = isRes
        ? (k.bh < lv.price - tol * 0.5)
        : (k.bl > lv.price + tol * 0.5);

      if(gained) h4GainCount++;
      else if(failed) h4FailCount++;
    }

    if(h4GainCount > 0){
      const label = isRes ? 'Gained' : 'Held';
      const countStr = h4GainCount > 1 ? ` ×${h4GainCount}` : '';
      rows.push({
        icon:'gain',
        text:`<strong>4H ${label} $${fmt(lv.price)}</strong>${countStr} — body closed ${isRes?'above':'below'} · ${lv.source||''}`,
        weight:2, dir: isRes ? 'bull' : 'bear'
      });
      isRes ? bullPoints += 2 * h4GainCount : bearPoints += 2 * h4GainCount;
    }
    if(h4FailCount > 0){
      const label = isRes ? 'Failed to gain' : 'Failed to hold';
      const countStr = h4FailCount > 1 ? ` ×${h4FailCount}` : '';
      rows.push({
        icon:'fail',
        text:`<strong>4H ${label} $${fmt(lv.price)}</strong>${countStr} — rejected · ${lv.source||''}`,
        weight:2, dir: isRes ? 'bear' : 'bull'
      });
      isRes ? bearPoints += 2 * h4FailCount : bullPoints += 2 * h4FailCount;
    }

    let h1GainCount = 0, h1FailCount = 0;
    for(const k of h1Recent){
      const touched = isRes ? (k.h >= lv.price - tol) : (k.l <= lv.price + tol);
      if(!touched) continue;
      const gained = isRes ? (k.bh > lv.price + tol) : (k.bl < lv.price - tol);
      const failed = isRes ? (k.bh < lv.price - tol*0.5) : (k.bl > lv.price + tol*0.5);
      if(gained) h1GainCount++;
      else if(failed) h1FailCount++;
    }

    if(h1GainCount > 0){
      const label = isRes ? 'gaining' : 'holding';
      rows.push({
        icon:'gain',
        text:`<strong>1H ${label} $${fmt(lv.price)}</strong> · ${h1GainCount}× body close ${isRes?'above':'below'} · ${lv.source||''}`,
        weight:1, dir: isRes ? 'bull' : 'bear'
      });
      isRes ? bullPoints += h1GainCount : bearPoints += h1GainCount;
    }
    if(h1FailCount > 0){
      const label = isRes ? 'failing' : 'losing';
      rows.push({
        icon:'fail',
        text:`<strong>1H ${label} $${fmt(lv.price)}</strong> · rejected ${h1FailCount}× · ${lv.source||''}`,
        weight:1, dir: isRes ? 'bear' : 'bull'
      });
      isRes ? bearPoints += h1FailCount : bullPoints += h1FailCount;
    }
  }

  const topRows = rows.slice(-8);

  if(topRows.length === 0){
    return {
      rows:[{ icon:'neutral', text:'No significant level interactions yet this session' }],
      conclusion:'Watching for price to engage a key level',
      storyDir:'UNCLEAR',
      bullPoints, bearPoints
    };
  }

  const net = bullPoints - bearPoints;
  let storyDir, conclusion;
  if(net >= 3){
    storyDir = 'UP';
    conclusion = `<span style="color:#00e676">Bullish structure</span> · price gaining key levels (${bullPoints} bull vs ${bearPoints} bear pts)`;
  } else if(net <= -3){
    storyDir = 'DOWN';
    conclusion = `<span style="color:#ff3d5a">Bearish structure</span> · price failing key levels (${bearPoints} bear vs ${bullPoints} bull pts)`;
  } else if(net > 0){
    storyDir = 'UNCLEAR';
    conclusion = `<span style="color:#ffc107">Slight bullish lean</span> · contested at key levels — wait for clarity`;
  } else if(net < 0){
    storyDir = 'UNCLEAR';
    conclusion = `<span style="color:#ffc107">Slight bearish lean</span> · contested at key levels — wait for clarity`;
  } else {
    storyDir = 'UNCLEAR';
    conclusion = `<span style="color:#ffc107">No clear story</span> · price ranging between levels`;
  }

  return { rows: topRows, conclusion, storyDir, bullPoints, bearPoints };
}

// ── NEXTMOVE: HTF DIRECTION ANALYSIS ────────────────────────
function nextMove(h4C, h1C){
  const n4=h4C.length, n1=h1C.length;
  if(n4<8||n1<8) return {dir:'UNCLEAR',reason:'Insufficient 4H/1H data'};

  const h4 = h4C.slice(-6);
  let bull4=0, bear4=0;
  for(let i=1;i<h4.length;i++){
    if(h4[i].bh > h4[i-1].bh && h4[i].bl > h4[i-1].bl) bull4++;
    else if(h4[i].bh < h4[i-1].bh && h4[i].bl < h4[i-1].bl) bear4++;
  }

  const h4n=h4C[n4-1], h4p=h4C[n4-2], h4pp=h4C[n4-3];
  const h4FailedHigh = h4n.bh < h4p.bh && h4p.bh > h4pp.bh;
  const h4FailedLow  = h4n.bl > h4p.bl && h4p.bl < h4pp.bl;

  const h1 = h1C.slice(-8);
  let bull1=0, bear1=0;
  for(let i=1;i<h1.length;i++){
    if(h1[i].bh > h1[i-1].bh) bull1++;
    else bear1++;
  }

  const h1n=h1C[n1-1], h1p=h1C[n1-2];
  const h1Bearish = h1n.bh < h1p.bh && h1n.bl < h1p.bl;
  const h1Bullish = h1n.bh > h1p.bh && h1n.bl > h1p.bl;

  const bearScore = bear4 + (h4FailedHigh?2:0) + (bear1>=5?1:0) + (h1Bearish?1:0);
  const bullScore = bull4 + (h4FailedLow?2:0)  + (bull1>=5?1:0) + (h1Bullish?1:0);

  const threshold = 2;
  if(bullScore >= threshold && bullScore > bearScore)
    return {dir:'UP',   reason:`4H gaining (${bull4}/5 bars up) · 1H confirming (${bull1}/7 bullish)`};
  if(bearScore >= threshold && bearScore > bullScore)
    return {dir:'DOWN', reason:`4H failing (${bear4}/5 bars down) · 1H confirming (${bear1}/7 bearish)`};
  if(h4FailedHigh && h1Bearish)
    return {dir:'DOWN', reason:`4H failed to gain last high · 1H trending down`};
  if(h4FailedLow && h1Bullish)
    return {dir:'UP',   reason:`4H failed to lose last low · 1H trending up`};
  if(h4n.bh > h4p.bh && h4n.bl > h4p.bl)
    return {dir:'UP',   reason:`Slight 4H bias UP (last candle higher body) — use caution`};
  if(h4n.bh < h4p.bh && h4n.bl < h4p.bl)
    return {dir:'DOWN', reason:`Slight 4H bias DOWN (last candle lower body) — use caution`};
  return {dir:'UNCLEAR',reason:'No clear 4H/1H direction — both sides contested'};
}

// ── COLLECTLEVELS: GATHER ALL LEVELS FOR LEVELS PAGE ────────
function collectLevels(wC, dC, p, c15m){
  const wLvls = findVPeaks(wC,'1W').map(l=>({...l,tf:'1W',source:'W-Peak'}));
  const dLvls = findVPeaks(dC,'1D').map(l=>({...l,tf:'1D',source:'D-Peak'}));
  const pdhl = [];
  if(dC && dC.length>1){
    const prev = dC[dC.length-2];
    pdhl.push({price:prev.h, type:'R', tf:'PDH', source:'PDH'});
    pdhl.push({price:prev.l, type:'S', tf:'PDL', source:'PDL'});
  }
  const asia   = c15m ? getAsiaLevels(c15m).map(l=>({...l,tf:'SESSION',source:'Asia'})) : [];
  const london = c15m ? getLondonLevels(c15m).map(l=>({...l,tf:'SESSION',source:'London'})) : [];
  const ny     = c15m ? getNYLevels(c15m).map(l=>({...l,tf:'SESSION',source:'NY'})) : [];

  const all = [...wLvls,...dLvls,...pdhl,...asia,...london,...ny].sort((a,b)=>b.price-a.price);

  const dd = [];
  for(const l of all){
    if(!dd.find(d=>Math.abs(d.price-l.price)/l.price<0.004)) dd.push(l);
  }

  const above = dd.filter(l=>l.price>p).slice(0,8);
  const below = dd.filter(l=>l.price<p).slice(-8).reverse();
  return [...above,...below].sort((a,b)=>b.price-a.price);
}

// ── WEBSOCKET FOR 15M REAL-TIME ────────────────────────────────
function connectWS(coinId){
  const s = coinState[coinId];
  const c = COINS[coinId];
  if(s.ws) s.ws.close();

  const symbol = c.bnSym.toLowerCase();
  const wsUrl = `wss://stream.binance.com:9443/ws/${symbol}@kline_15m`;

  try{
    s.ws = new WebSocket(wsUrl);

    s.ws.onmessage = (event) => {
      try{
        const data = JSON.parse(event.data);
        if(!data.k) return;

        const kline = data.k;
        if(!s.candles15m || !s.candles15m.length) return;

        const candle = {
          t: kline.t,
          o: parseFloat(kline.o),
          h: parseFloat(kline.h),
          l: parseFloat(kline.l),
          c: parseFloat(kline.c),
          v: parseFloat(kline.v),
          bh: Math.max(parseFloat(kline.o), parseFloat(kline.c)),
          bl: Math.min(parseFloat(kline.o), parseFloat(kline.c)),
        };

        // Update last candle in memory
        if(s.candles15m[s.candles15m.length-1].t === candle.t){
          s.candles15m[s.candles15m.length-1] = candle;
        } else {
          s.candles15m.push(candle);
          if(s.candles15m.length > 300) s.candles15m.shift();
        }

        // Update price and re-run 15m signal if on active coin
        if(coinId === activeCoin){
          price = candle.c;
          s.price = candle.c;
          renderTopFromState();
        }
      }catch(e){ console.error('WS message error', e); }
    };

    s.ws.onerror = () => {
      console.log('WS error for', coinId, '— falling back to REST polling');
      s.ws = null;
    };

    s.ws.onclose = () => {
      console.log('WS closed for', coinId);
      s.ws = null;
    };
  }catch(e){
    console.error('WS connect error', e);
    s.ws = null;
  }
}

function renderLevelsPriceVisualization(){

    document.getElementById('price-ladder').classList.remove('active');

  const ladder = document.getElementById('price-ladder');
  if(allLevels.length && allLevels[0].price){
    ladder.classList.add('active');
    const track = document.getElementById('ladder-track') || (()=>{
      const t = document.createElement('div');
      t.id = 'ladder-track';
      t.className = 'ladder-track';
      ladder.appendChild(t);
      return t;
    })();

    const minPrice = Math.min(...allLevels.map(l=>l.price));
    const maxPrice = Math.max(...allLevels.map(l=>l.price));
    const range = maxPrice - minPrice;

    track.innerHTML = allLevels.map(l=>{
      const pos = ((l.price - minPrice) / range) * 100;
      const type = l.price > price ? 'resistance' : 'support';
      return `<div class="ladder-level ${type}" style="top:${100-pos}%">
        <span class="ladder-price">${fmt(l.price)}</span>
      </div>`;
    }).join('');

    // Add current price marker
    if(price >= minPrice && price <= maxPrice){
      const currentPos = ((price - minPrice) / range) * 100;
      const current = document.createElement('div');
      current.className = 'ladder-level current';
      current.style.top = (100 - currentPos) + '%';
      track.appendChild(current);
    }
  } else {
    ladder.classList.remove('active');
  }
}

let lastSignalAlertTime = {};

function maybeAlert(sig, tf, type, level, target, rr, coinId, state){
  if(isDedupSuppressed(coinId, tf, type, level)) return;
  coinId = coinId || activeCoin;
  state = state || coinState[coinId];
  const alertKey = `${coinId}_${tf}_${type}_${Math.round(level)}`;
  if(state.sentAlerts[alertKey]) return;
  state.sentAlerts[alertKey] = Date.now();
  const now=Date.now();
  Object.keys(state.sentAlerts).forEach(k=>{if(now-state.sentAlerts[k]>7200000)delete state.sentAlerts[k];});

  const htfOnly = localStorage.getItem('alert_htfonly')==='true';
  if(htfOnly && tf!=='1D' && tf!=='1H') return;

  const wantShort = localStorage.getItem('alert_short')!=='false';
  const wantLong  = localStorage.getItem('alert_long')!=='false';
  const wantLevel = localStorage.getItem('alert_atlevel')==='true';
  const wantToast = localStorage.getItem('alert_toast')!=='false';

  if((type==='FAIL_GAIN') && !wantShort) return;
  if((type==='FAIL_LOSE'||type==='BLIND_ENTRY') && !wantLong) return;
  if(type==='AT_LEVEL' && !wantLevel) return;

  markDedupFired(coinId, tf, type, level);

  const typeLabel=type==='FAIL_GAIN'?'FAIL GAIN':type==='FAIL_LOSE'?'FAIL LOSE':type==='BLIND_ENTRY'?'BLIND ENTRY':'SETUP';
  const msg = `🎯 ${COINS[coinId].shortLabel} ${typeLabel}\n${sig} ${tf}\nLevel: $${fmt(level)}\nTarget: $${fmt(target)}\nR:R ${rr}`;

  sendTelegram(msg);

  if(wantToast){
    showToast(`${sig} ${typeLabel}`, `${COINS[coinId].shortLabel} ${tf} · $${fmt(level)}`, true);
  }

  // Show persistent alert (only for 15m)
  if(tf === '15m'){
    showPersistentAlert(`⚡ 15m ${sig} ${typeLabel} at $${fmt(level)}`);
    // Set notification badge
    if(!isOnSignalPage()){
      document.getElementById('signal-badge').style.display='block';
    }
  }

  // Add to log & track open trade
  addLog(sig, tf, typeLabel, type, level, target, rr, stopPrice, coinId);
  recordOpenTrade(sig, tf, level, target, stopPrice, typeLabel, coinId);
}

async function runCoinEngine(coinId){
  const s = coinState[coinId];
  if(s.running) return;
  s.running = true;

  try {
    // Fetch candles
    const c15m = await getCandles('15m', coinId);
    const c1h = await getCandles('1H', coinId);
    const c4h = await getCandles('4H', coinId);
    const c1d = await getCandles('1D', coinId);
    const c1w = await getCandles('1W', coinId);

    if(!c15m.length) return;

    s.price = c15m[c15m.length-1].c;
    s.change = await get24hChange(coinId);
    s.candles15m = c15m;

    // Determine HTF direction
    const h1Sig = dms(c1h, c1h, '1H', 'UNCLEAR');
    const h4Sig = dms(c4h, c4h, '4H', 'UNCLEAR');

    if(h1Sig.sig === 'LONG' && h4Sig.sig === 'LONG') s.htfDir = 'UP';
    else if(h1Sig.sig === 'SHORT' && h4Sig.sig === 'SHORT') s.htfDir = 'DOWN';
    else s.htfDir = 'MIXED';

    // Run DMS on all timeframes
    const r15m = dms(c15m, c1d, '15m', s.htfDir);
    const r1h = dms(c1h, c1d, '1H', 'UNCLEAR');
    const r4h = dms(c4h, c1d, '4H', 'UNCLEAR');
    const r1d = dms(c1d, null, '1D', 'UNCLEAR');
    const r1w = dms(c1w, null, '1W', 'UNCLEAR');

    // Build conviction score
    s.conviction = buildConvictionScore(c15m, c1h, c4h, h1Sig, h4Sig);

    // Store results
    s.results = {
      '15m': r15m,
      '1H': r1h,
      '4H': r4h,
      '1D': r1d,
      '1W': r1w,
    };

    // Collect all levels using the new collectLevels function
    s.allLevels = collectLevels(c1w, c1d, s.price, c15m);

    // Build Story: analyze how price is behaving at key levels
    const story = buildStory(s.allLevels, c4h, c1h, s.price);
    if(story){
      s.lastStory = story;
    }

    // Next Move: HTF direction analysis
    const nm = nextMove(c4h, c1h);
    if(nm){
      s.lastStory = {...s.lastStory, ...nm, story};
    }

    // Check auto-outcomes
    checkAutoOutcomes(coinId);

    // Maybe alert
    if(r15m.type !== 'NONE'){
      maybeAlert(r15m.sig, '15m', r15m.type, r15m.level, r15m.target, r15m.rr, coinId, s);
    }
    if(r1h.type !== 'NONE'){
      maybeAlert(r1h.sig, '1H', r1h.type, r1h.level, r1h.target, r1h.rr, coinId, s);
    }
    if(r4h.type !== 'NONE'){
      maybeAlert(r4h.sig, '4H', r4h.type, r4h.level, r4h.target, r4h.rr, coinId, s);
    }

    // Render
    if(coinId === activeCoin){
      syncActiveState();
      renderTopFromState();
      renderHero();
      renderCards();
      renderLevels();
      renderOpenTrades();
      if(s.lastStory){
        renderNM(s.lastStory);
      }
      if(s.candles15m) renderSessionBanner(s.candles15m, coinId);
      checkCorrelationWarning();
    }
  } finally {
    s.running = false;
  }
}

async function engineLoop(){
  for(const coinId of Object.keys(COINS)){
    await runCoinEngine(coinId);
    await sleep(500);
  }
}

// ── STATS ENGINE ──────────────────────────────────────────
function calcStats(){
  const entries = loadLog().filter(e => e.status === 'hit' || e.status === 'stopped');
  if(!entries.length) return null;

  const total  = entries.length;
  const wins   = entries.filter(e=>e.status==='hit').length;
  const losses = entries.filter(e=>e.status==='stopped').length;
  const winRate = (wins/total*100).toFixed(0);

  const byType = {};
  entries.forEach(e => {
    const k = e.type || 'UNKNOWN';
    if(!byType[k]) byType[k] = {w:0,l:0};
    e.status==='hit' ? byType[k].w++ : byType[k].l++;
  });

  const byTF = {};
  entries.forEach(e => {
    const k = e.tf || '?';
    if(!byTF[k]) byTF[k] = {w:0,l:0};
    e.status==='hit' ? byTF[k].w++ : byTF[k].l++;
  });

  const byCoin = {};
  entries.forEach(e => {
    const k = (e.coin && COINS[e.coin]) ? COINS[e.coin].shortLabel : 'BTC';
    if(!byCoin[k]) byCoin[k] = {w:0,l:0};
    e.status==='hit' ? byCoin[k].w++ : byCoin[k].l++;
  });

  const bySession = {ASIA:{w:0,l:0},LONDON:{w:0,l:0},NY:{w:0,l:0},OTHER:{w:0,l:0}};
  entries.forEach(e => {
    const h = e.ts ? new Date(e.ts).getUTCHours() : -1;
    const b = getSessionBoundaries();
    let sess = 'OTHER';
    if(h >= b.asiaOpen && h < b.asiaClose) sess = 'ASIA';
    else if(h >= b.londonOpen && h < b.londonClose) sess = 'LONDON';
    else if(h >= b.nyOpen && h < b.nyClose) sess = 'NY';
    e.status==='hit' ? bySession[sess].w++ : bySession[sess].l++;
  });

  const winRR  = entries.filter(e=>e.status==='hit'&&e.rr).map(e=>+e.rr);
  const lossRR = entries.filter(e=>e.status==='stopped'&&e.rr).map(e=>+e.rr);
  const avgWinRR  = winRR.length  ? (winRR.reduce((a,b)=>a+b,0)/winRR.length).toFixed(1)  : null;
  const avgLossRR = lossRR.length ? (lossRR.reduce((a,b)=>a+b,0)/lossRR.length).toFixed(1) : null;

  const recent20 = entries.slice(0,20);
  let curStreak=0, curStreakType='';
  for(const e of recent20){
    const w = e.status==='hit';
    if(!curStreakType){ curStreakType=w?'W':'L'; curStreak=1; }
    else if((curStreakType==='W')===w) curStreak++;
    else break;
  }

  return { total, wins, losses, winRate, byType, byTF, byCoin, bySession,
           avgWinRR, avgLossRR, streak: {count:curStreak, type:curStreakType},
           recent20 };
}

function renderStats(){
  const el = document.getElementById('stats-grid');
  if(!el) return;

  const allEntries = loadLog();
  const open = allEntries.filter(e=>e.status==='open').length;
  const stats = calcStats();

  if(!stats){
    el.innerHTML = `<div class="stat-card" style="grid-column:1/-1;text-align:center;padding:30px">
      <div style="font-size:20px;margin-bottom:6px">No completed trades yet</div>
      <div style="color:#5d7a99;font-size:10px">${open} open — mark TP HIT or STOPPED in the Log tab</div>
    </div>`;
    document.getElementById('stats-by-type').textContent = '—';
    document.getElementById('stats-by-tf').textContent = '—';
    document.getElementById('stats-by-session').textContent = '—';
    return;
  }

  const wr = +stats.winRate;
  const wrColor = wr>=60?'green':wr>=45?'yellow':'red';

  const streakDots = stats.recent20.map(e =>
    `<span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${e.status==='hit'?'#00e676':'#ff3d5a'};margin-right:2px"></span>`
  ).join('');

  el.innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Win Rate</div>
      <div class="stat-value ${wrColor}" style="font-size:32px">${stats.winRate}%</div>
      <div style="height:4px;background:#1a2230;border-radius:2px;margin-top:6px;overflow:hidden">
        <div style="height:100%;width:${stats.winRate}%;background:${wr>=60?'#00e676':wr>=45?'#ffc107':'#ff3d5a'};border-radius:2px"></div>
      </div>
      <div style="font-size:9px;color:#5d7a99;margin-top:4px">${stats.wins}W / ${stats.losses}L / ${stats.total} total</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">${stats.streak.type==='W'?'Win':'Loss'} Streak</div>
      <div class="stat-value white" style="font-size:32px">${stats.streak.count}</div>
      <div style="margin-top:6px">${streakDots}</div>
    </div>
    ${stats.avgWinRR ? `
    <div class="stat-card">
      <div class="stat-label">Avg R:R (Wins)</div>
      <div class="stat-value green" style="font-size:28px">${stats.avgWinRR}</div>
      ${stats.avgLossRR ? `<div style="font-size:9px;color:#5d7a99;margin-top:4px">${stats.avgLossRR} avg on losses</div>` : ''}
    </div>` : ''}
    <div class="stat-card">
      <div class="stat-label">Open Trades</div>
      <div class="stat-value white" style="font-size:28px">${open}</div>
      <div style="font-size:9px;color:#5d7a99;margin-top:4px">Auto-checking TP/SL</div>
    </div>`;

  // By Type
  const typeLabels = {FAIL_GAIN:'Fail to Gain',FAIL_LOSE:'Fail to Lose',BLIND_ENTRY:'Blind Entry',BREAKOUT:'Breakout',AT_LEVEL:'At Level'};
  const typeText = Object.entries(stats.byType)
    .sort((a,b)=>(b[1].w+b[1].l)-(a[1].w+a[1].l))
    .map(([k,v])=>{
      const t=v.w+v.l, r=(v.w/t*100).toFixed(0);
      const c = +r>=60?'#00e676':+r>=45?'#ffc107':'#ff3d5a';
      return `<span style="color:${c}">${typeLabels[k]||k} ${r}%</span> (${v.w}W/${v.l}L)`;
    }).join(' · ');
  document.getElementById('stats-by-type').innerHTML = typeText || '—';

  // By TF
  const tfText = Object.entries(stats.byTF)
    .sort((a,b)=>(b[1].w+b[1].l)-(a[1].w+a[1].l))
    .map(([k,v])=>{
      const t=v.w+v.l, r=(v.w/t*100).toFixed(0);
      const c = +r>=60?'#00e676':+r>=45?'#ffc107':'#ff3d5a';
      return `<span style="color:${c}">${k} ${r}%</span> (${v.w}W/${v.l}L)`;
    }).join(' · ');
  document.getElementById('stats-by-tf').innerHTML = tfText || '—';

  // By Session
  const sessEmoji = {ASIA:'Asia',LONDON:'London',NY:'NY',OTHER:'After Hrs'};
  const sessText = Object.entries(stats.bySession)
    .filter(([,v])=>v.w+v.l>0)
    .map(([k,v])=>{
      const t=v.w+v.l, r=(v.w/t*100).toFixed(0);
      const c = +r>=60?'#00e676':+r>=45?'#ffc107':'#ff3d5a';
      return `<span style="color:${c}">${sessEmoji[k]||k} ${r}%</span> (${v.w}W/${v.l}L)`;
    }).join(' · ');
  document.getElementById('stats-by-session').innerHTML = sessText || 'No session data yet';
}

// ── INIT ─────────────────────────────────────────────────────
async function init(){
  loadSettings();
  document.getElementById('coin-sel').value = activeCoin;

  // Initial run
  await engineLoop();

  // Periodic refresh
  setInterval(engineLoop, REFRESH);

  // Connect WebSockets for 15m real-time updates
  for(const coinId of Object.keys(COINS)){
    connectWS(coinId);
  }

  // Render stats when visited
  document.getElementById('nav-stats').onclick = function(){ nav('stats', this); renderStats(); };

  // Setup rendering on active coin change
  const selectEl = document.getElementById('coin-sel');
  selectEl.onchange = function(){ switchCoin(this.value); };
}

// Start on load
window.addEventListener('load', init);

// Dismiss signal badge when returning to signal page
window.addEventListener('visibilitychange', ()=>{
  if(!document.hidden && isOnSignalPage()){
    document.getElementById('signal-badge').style.display='none';
  }
});
</script>
