<!DOCTYPE html>

<html lang="en" style="background:#07090d">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>DMC Signal · BTC</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;600&family=Sora:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#07090d;color:#dce8f5;font-family:'Sora',system-ui,sans-serif;min-height:100%;-webkit-text-size-adjust:100%}
body{padding-bottom:calc(68px + env(safe-area-inset-bottom,0px));overflow-x:hidden}

/* GRID BG */
body::before{content:’’;position:fixed;inset:0;background-image:linear-gradient(rgba(0,230,118,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(0,230,118,.015) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}

/* TOP BAR */
.topbar{position:sticky;top:0;z-index:100;background:#07090dF5;border-bottom:1px solid #1a2230;padding:calc(env(safe-area-inset-top,0px) + 10px) 16px 10px;display:flex;align-items:center;gap:10px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.brand{font-family:‘Bebas Neue’,sans-serif;font-size:24px;letter-spacing:.1em;color:#00e676;line-height:1;flex-shrink:0}
.pair{font-family:‘IBM Plex Mono’,monospace;font-size:10px;color:#5d7a99;background:#10151c;border:1px solid #1a2230;padding:3px 8px;border-radius:4px;letter-spacing:.06em}
.topbar-r{margin-left:auto;display:flex;align-items:center;gap:8px}
#tb-price{font-family:‘IBM Plex Mono’,monospace;font-size:16px;font-weight:600;color:#dce8f5}
#tb-chg{font-family:‘IBM Plex Mono’,monospace;font-size:11px;padding:3px 7px;border-radius:4px;display:none}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:#ffc107}
.dot.ok{background:#00e676;animation:pulse 2s infinite}
.dot.err{background:#ff3d5a;animation:none}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,230,118,.5)}50%{box-shadow:0 0 0 5px rgba(0,230,118,0)}}

/* STATUS */
.statusbar{display:flex;align-items:center;gap:6px;padding:5px 16px;border-bottom:1px solid #1a2230;background:#0c0f14}
#status-txt{font-family:‘IBM Plex Mono’,monospace;font-size:9px;color:#3d5068;flex:1}
#last-upd{font-family:‘IBM Plex Mono’,monospace;font-size:9px;color:#3d5068}

/* PAGES */
.page{display:none;position:relative;z-index:1}
.page.active{display:block}

/* HERO CARD */
.hero{margin:14px 16px;border-radius:14px;padding:20px 18px;border:1px solid #243040;background:#10151c;position:relative;overflow:hidden;transition:background .4s,border-color .4s}
.hero.long{background:#001f0e;border-color:rgba(0,230,118,.3)}
.hero.short{background:#1a0008;border-color:rgba(255,61,90,.3)}
.hero.neutral{background:#1a1400;border-color:rgba(255,193,7,.25)}
.hero-glow{position:absolute;top:-40px;left:-40px;width:180px;height:180px;border-radius:50%;opacity:.12;pointer-events:none;filter:blur(40px);transition:background .4s}
.hero.long .hero-glow{background:#00e676}
.hero.short .hero-glow{background:#ff3d5a}
.hero.neutral .hero-glow{background:#ffc107}
.hero-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:12px}
.hero-dir{font-family:‘Bebas Neue’,sans-serif;font-size:68px;line-height:.85;letter-spacing:.03em;color:#5d7a99;transition:color .4s;flex:1}
.hero.long .hero-dir{color:#00e676}
.hero.short .hero-dir{color:#ff3d5a}
.hero.neutral .hero-dir{color:#ffc107}
.hero-meta{text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:4px;padding-top:4px;flex-shrink:0}
.hero-tfs{font-family:‘IBM Plex Mono’,monospace;font-size:10px;color:#5d7a99;white-space:nowrap}
.hero-conf{font-family:‘IBM Plex Mono’,monospace;font-size:10px;font-weight:600;padding:3px 8px;border-radius:5px;border:1px solid #243040;background:#0c0f14;color:#dce8f5;white-space:nowrap}
.hero-conf.high{background:rgba(0,230,118,.12);border-color:rgba(0,230,118,.3);color:#00e676}
.hero-conf.med{background:rgba(255,193,7,.1);border-color:rgba(255,193,7,.3);color:#ffc107}
.hero-reason{font-family:‘IBM Plex Mono’,monospace;font-size:10px;color:#5d7a99;line-height:1.6;border-top:1px solid #1a2230;padding-top:10px;margin-top:2px}

/* NEXT MOVE */
.nm-card{margin:0 16px 14px;border-radius:10px;background:#0c0f14;border:1px solid #1a2230;padding:14px 16px;display:flex;align-items:center;gap:14px}
.nm-left{flex:1}
.nm-lbl{font-family:‘IBM Plex Mono’,monospace;font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:#3d5068;margin-bottom:4px}
.nm-sub{font-family:‘IBM Plex Mono’,monospace;font-size:9px;color:#3d5068;line-height:1.5;margin-top:4px}
.nm-val{font-family:‘Bebas Neue’,sans-serif;font-size:36px;letter-spacing:.06em;line-height:1;color:#5d7a99}
.nm-val.UP{color:#00e676}
.nm-val.DOWN{color:#ff3d5a}
.nm-val.UNCLEAR{color:#ffc107}

/* SECTION HEADER */
.sh{padding:12px 16px 8px;font-family:‘IBM Plex Mono’,monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:#3d5068;display:flex;align-items:center;gap:6px}
.sh::before{content:’’;width:12px;height:1px;background:#1a2230}

/* TF CARDS */
.tf-cards{padding:0 16px 4px;display:flex;flex-direction:column;gap:8px}
.tfc{background:#0c0f14;border:1px solid #1a2230;border-radius:10px;padding:14px;position:relative;overflow:hidden}
.tfc::before{content:’’;position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px;background:#3d5068}
.tfc.long::before{background:#00e676}
.tfc.short::before{background:#ff3d5a}
.tfc.neutral::before{background:#ffc107}
.tfc-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.tfc-tf{font-family:‘IBM Plex Mono’,monospace;font-size:13px;font-weight:600;color:#dce8f5;min-width:30px}
.tfc-type{font-family:‘IBM Plex Mono’,monospace;font-size:9px;font-weight:700;letter-spacing:.07em;padding:3px 8px;border-radius:4px;white-space:nowrap}
.tfc-type.FAIL_GAIN{background:rgba(255,61,90,.12);color:#ff3d5a;border:1px solid rgba(255,61,90,.25)}
.tfc-type.FAIL_LOSE{background:rgba(0,230,118,.1);color:#00e676;border:1px solid rgba(0,230,118,.22)}
.tfc-type.AT_LEVEL{background:rgba(255,193,7,.1);color:#ffc107;border:1px solid rgba(255,193,7,.22)}
.tfc-type.NONE{background:#10151c;color:#3d5068;border:1px solid #1a2230}
.tfc-sig{margin-left:auto;font-family:‘IBM Plex Mono’,monospace;font-size:13px;font-weight:700}
.tfc-sig.LONG{color:#00e676}.tfc-sig.SHORT{color:#ff3d5a}.tfc-sig.NEUTRAL{color:#ffc107}.tfc-sig.WAIT{color:#3d5068}
.tfc-reason{font-family:‘IBM Plex Mono’,monospace;font-size:9px;color:#5d7a99;line-height:1.55}
.tfc-prices{display:flex;gap:14px;margin-top:8px;padding-top:8px;border-top:1px solid #1a2230}
.tcp{font-family:‘IBM Plex Mono’,monospace;font-size:9px}
.tcp-l{color:#3d5068;margin-right:4px}

/* TF TAB BAR (chart) */
.tf-bar{display:flex;gap:6px;padding:10px 16px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid #1a2230;background:#0c0f14}
.tf-bar::-webkit-scrollbar{display:none}
.tf-btn{flex-shrink:0;font-family:‘IBM Plex Mono’,monospace;font-size:12px;font-weight:600;padding:8px 16px;border-radius:7px;border:1px solid #1a2230;background:transparent;color:#5d7a99;cursor:pointer;transition:all .15s;letter-spacing:.05em}
.tf-btn.active{background:#00e676;color:#07090d;border-color:#00e676}

/* CHART */
.chart-wrap{height:calc(100svh - 160px);min-height:380px}
.chart-wrap>div{width:100%;height:100%}

/* LEVELS */
.lvl-item{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid #1a2230}
.lvl-item.untested{background:rgba(255,193,7,.025)}
.lvl-badge{font-family:‘IBM Plex Mono’,monospace;font-size:10px;font-weight:700;width:36px;text-align:center;padding:4px 0;border-radius:5px}
.lvl-badge.R{color:#ff3d5a;background:rgba(255,61,90,.1)}
.lvl-badge.S{color:#00e676;background:rgba(0,230,118,.08)}
.lvl-info{flex:1}
.lvl-tf{font-family:‘IBM Plex Mono’,monospace;font-size:10px;color:#3d5068}
.lvl-untag{font-family:‘IBM Plex Mono’,monospace;font-size:8px;color:#ffc107;margin-left:5px}
.lvl-right{text-align:right}
.lvl-price{font-family:‘IBM Plex Mono’,monospace;font-size:14px;font-weight:600}
.lvl-price.R{color:#ff3d5a}
.lvl-price.S{color:#00e676}
.lvl-dist{font-family:‘IBM Plex Mono’,monospace;font-size:9px;color:#3d5068;margin-top:2px}

/* LOG */
.log-item{display:flex;gap:10px;padding:12px 16px;border-bottom:1px solid #1a2230;border-left:3px solid transparent}
.log-item.long{border-left-color:#00e676}
.log-item.short{border-left-color:#ff3d5a}
.log-item.neutral{border-left-color:#ffc107}
.log-time{font-family:‘IBM Plex Mono’,monospace;font-size:9px;color:#3d5068;flex-shrink:0;padding-top:1px;min-width:36px}
.log-txt{font-family:‘IBM Plex Mono’,monospace;font-size:10px;color:#5d7a99;line-height:1.5}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:#07090dF5;border-top:1px solid #1a2230;display:flex;padding-bottom:env(safe-area-inset-bottom,0px);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px 4px 12px;font-family:‘IBM Plex Mono’,monospace;font-size:9px;letter-spacing:.07em;color:#3d5068;background:none;border:none;cursor:pointer;transition:color .2s;text-transform:uppercase}
.nb.active{color:#00e676}
.nb svg{width:21px;height:21px;stroke-width:1.5;flex-shrink:0}

/* REFRESH FAB */
.fab{position:fixed;bottom:calc(80px + env(safe-area-inset-bottom,0px));right:16px;z-index:150;width:44px;height:44px;border-radius:50%;background:#10151c;border:1px solid #243040;color:#5d7a99;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,0,0,.5);transition:transform .15s,color .15s}
.fab:active{transform:scale(.88)}
.fab.spin{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* SKEL */
.skel{background:linear-gradient(90deg,#1a2230 25%,#243040 50%,#1a2230 75%);background-size:200% 100%;animation:skel 1.5s infinite;border-radius:3px;display:inline-block}
@keyframes skel{0%{background-position:200% center}100%{background-position:-200% center}}

/* EMPTY */
.empty{padding:24px 16px;font-family:‘IBM Plex Mono’,monospace;font-size:10px;color:#3d5068;text-align:center}
</style>

</head>
<body>

<!-- TOP BAR -->

<div class="topbar">
  <span class="brand">DMC ⚡</span>
  <span class="pair">BTC/USD</span>
  <div class="topbar-r">
    <span id="tb-price">—</span>
    <span id="tb-chg"></span>
    <span class="dot" id="dot"></span>
  </div>
</div>

<!-- STATUS -->

<div class="statusbar">
  <span id="status-txt">Connecting...</span>
  <span id="last-upd"></span>
</div>

<!-- PAGE: SIGNAL -->

<div class="page active" id="page-signal">

  <div class="hero wait" id="hero">
    <div class="hero-glow"></div>
    <div class="hero-top">
      <div class="hero-dir" id="hero-dir">—</div>
      <div class="hero-meta">
        <div class="hero-tfs" id="hero-tfs">0 / 5 TFs</div>
        <div class="hero-conf" id="hero-conf">LOADING</div>
      </div>
    </div>
    <div class="hero-reason" id="hero-reason">Fetching candle data...</div>
  </div>

  <div class="nm-card">
    <div class="nm-left">
      <div class="nm-lbl">Next Major Move · HTF</div>
      <div class="nm-val UNCLEAR" id="nm-val">—</div>
      <div class="nm-sub" id="nm-sub">Analysing weekly + daily bodies...</div>
    </div>
  </div>

  <div class="sh">Timeframe Breakdown</div>
  <div class="tf-cards" id="tf-cards"></div>

</div>

<!-- PAGE: CHART -->

<div class="page" id="page-chart">
  <div class="tf-bar" id="tf-bar">
    <button class="tf-btn" data-iv="W">1W</button>
    <button class="tf-btn" data-iv="D">1D</button>
    <button class="tf-btn active" data-iv="240">4H</button>
    <button class="tf-btn" data-iv="60">1H</button>

  </div>
  <div class="chart-wrap" id="tv-wrap"></div>
</div>

<!-- PAGE: LEVELS -->

<div class="page" id="page-levels">
  <div class="sh">Key Levels · Untested Candle Bodies</div>
  <div id="lvl-list"><div class="empty">Loading levels...</div></div>
</div>

<!-- PAGE: LOG -->

<div class="page" id="page-log">
  <div class="sh">Signal Log</div>
  <div id="log-list">
    <div class="log-item neutral"><span class="log-time">--:--</span><span class="log-txt">Initialising DMC engine...</span></div>
  </div>
</div>

<!-- FAB -->

<button class="fab" id="fab" onclick="manualRefresh()">↻</button>

<!-- BOTTOM NAV -->

<nav class="bnav">
  <button class="nb active" onclick="nav('signal',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Signal
  </button>
  <button class="nb" onclick="nav('chart',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>Chart
  </button>
  <button class="nb" onclick="nav('levels',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>Levels
  </button>
  <button class="nb" onclick="nav('log',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/></svg>Log
  </button>
</nav>

<script>
'use strict';
const COIN='bitcoin', CG='https://api.coingecko.com/api/v3', REFRESH=120000;
const TFS=[{l:'1W',iv:'W',w:5},{l:'1D',iv:'D',w:4},{l:'4H',iv:'240',w:3},{l:'1H',iv:'60',w:2},{l:'15m',iv:'15',w:1}];
let results={}, allLevels=[], log=[], running=false, timer=null, price=0, tvLoaded=false;

// NAV
function nav(id, btn) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  btn.classList.add('active');
  if(id==='chart'&&!tvLoaded){loadTV('240');tvLoaded=true;}
}

// TRADINGVIEW
function loadTV(iv){
  const w=document.getElementById('tv-wrap');
  w.innerHTML='<div style="width:100%;height:100%"></div>';
  const s=document.createElement('script');
  s.src='https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js';
  s.async=true;
  s.textContent=JSON.stringify({autosize:true,symbol:'BINANCE:BTCUSDT',interval:iv,timezone:'Etc/UTC',theme:'dark',style:'1',locale:'en',backgroundColor:'#07090d',hide_top_toolbar:false,allow_symbol_change:false,save_image:false,hide_side_toolbar:true});
  w.firstChild.appendChild(s);
}
document.getElementById('tf-bar').addEventListener('click',e=>{
  const b=e.target.closest('.tf-btn'); if(!b)return;
  document.querySelectorAll('.tf-btn').forEach(x=>x.classList.toggle('active',x===b));
  loadTV(b.dataset.iv); tvLoaded=true;
});

// API
async function getPrice(){
  const r=await fetch(`${CG}/simple/price?ids=${COIN}&vs_currencies=usd&include_24hr_change=true`);
  if(!r.ok)throw new Error('Price: '+r.status);
  const d=await r.json();
  return{price:d[COIN].usd,change:d[COIN].usd_24h_change};
}
async function getOHLC(days){
  const r=await fetch(`${CG}/coins/${COIN}/ohlc?vs_currency=usd&days=${days}`);
  if(!r.ok)throw new Error(`OHLC ${days}: ${r.status}`);
  const raw=await r.json();
  if(!Array.isArray(raw)||!raw.length)throw new Error(`OHLC ${days}: empty`);
  return raw.map(k=>({t:k[0],o:k[1],h:k[2],l:k[3],c:k[4],bh:Math.max(k[1],k[4]),bl:Math.min(k[1],k[4])}));
}
async function getChart(days,mins){
  const r=await fetch(`${CG}/coins/${COIN}/market_chart?vs_currency=usd&days=${days}`);
  if(!r.ok)throw new Error(`Chart ${days}: ${r.status}`);
  const d=await r.json();
  const prices=d.prices; if(!prices||prices.length<4)throw new Error(`Chart ${days}: empty`);
  const bms=mins*60000, B={};
  for(const[ts,p]of prices){const b=Math.floor(ts/bms)*bms;if(!B[b])B[b]={t:b,o:p,h:p,l:p,c:p};else{B[b].h=Math.max(B[b].h,p);B[b].l=Math.min(B[b].l,p);B[b].c=p;}}
  return Object.values(B).sort((a,b)=>a.t-b.t).map(k=>({...k,bh:Math.max(k.o,k.c),bl:Math.min(k.o,k.c)}));
}
async function getCandles(tf){
  switch(tf.l){
    case'1W': try{return await getOHLC('max')}catch{return getOHLC('365')}
    case'1D': return getOHLC('90');
    case'4H': return getChart('16',240);
    case'1H': return getChart('7',60);
    case'15m':return getChart('2',15);
  }
}

// DMC ENGINE
function atr(c,p=14){const t=c.slice(1).map((x,i)=>Math.max(x.h-x.l,Math.abs(x.h-c[i].c),Math.abs(x.l-c[i].c)));return t.slice(-p).reduce((s,v)=>s+v,0)/p;}

function findLevels(c){
  const n=c.length,L=[];
  for(let i=5;i<n-3;i++){
    const x=c[i],sz=Math.abs(x.bh-x.bl);if(sz<0.001)continue;
    const isH=x.h>=Math.max(...c.slice(i-3,i+4).map(y=>y.h))-sz*0.1;
    const isL=x.l<=Math.min(...c.slice(i-3,i+4).map(y=>y.l))+sz*0.1;
    if(!isH&&!isL)continue;
    const tested=c.slice(i+1).some(f=>f.bh>=x.bl&&f.bl<=x.bh);
    L.push({price:isH?x.bh:x.bl,bh:x.bh,bl:x.bl,type:isH?'resistance':'support',tested,idx:i});
  }
  return L;
}

function dmc(c,a){
  const n=c.length; if(n<20)return{sig:'NEUTRAL',type:'NONE',reason:'Insufficient data'};
  const tol=a*0.15, levels=findLevels(c);
  const rel=levels.filter(l=>Math.abs(l.price-c[n-1].c)<a*8);
  // FAIL TO GAIN → SHORT
  for(const lv of rel.filter(l=>l.type==='resistance')){
    for(let lb=2;lb<=6;lb++){
      if(n-lb<0)break;
      const at=c[n-lb],cu=c[n-1];
      if(at.bh>lv.price-tol&&cu.bh<lv.price+tol&&cu.c<lv.price&&c[n-lb-1]?.c<lv.price){
        const lbC=c.slice(Math.max(0,n-lb-60),n-lb).filter(x=>x.bl<cu.c);
        const tgt=lbC.length?Math.min(...lbC.map(x=>x.bl)):cu.c*0.98;
        return{sig:'SHORT',type:'FAIL_GAIN',level:lv.price,target:tgt,reason:`Failed to gain $${fmt(lv.price)} — body closed back below. Target: $${fmt(tgt)}`,strength:lb<=3?'high':'med',untested:!lv.tested};
      }
    }
  }
  // FAIL TO LOSE → LONG
  for(const lv of rel.filter(l=>l.type==='support')){
    for(let lb=2;lb<=6;lb++){
      if(n-lb<0)break;
      const at=c[n-lb],cu=c[n-1];
      if(at.bl<lv.price+tol&&cu.bl>lv.price-tol&&cu.c>lv.price&&c[n-lb-1]?.c>lv.price){
        const lbC=c.slice(Math.max(0,n-lb-60),n-lb).filter(x=>x.bh>cu.c);
        const tgt=lbC.length?Math.max(...lbC.map(x=>x.bh)):cu.c*1.02;
        return{sig:'LONG',type:'FAIL_LOSE',level:lv.price,target:tgt,reason:`Failed to lose $${fmt(lv.price)} — body closed back above. Target: $${fmt(tgt)}`,strength:lb<=3?'high':'med',untested:!lv.tested};
      }
    }
  }
  // AT LEVEL
  const near=rel.filter(l=>!l.tested).sort((a,b)=>Math.abs(a.price-c[n-1].c)-Math.abs(b.price-c[n-1].c))[0];
  if(near&&Math.abs(near.price-c[n-1].c)<a*1.5)
    return{sig:'NEUTRAL',type:'AT_LEVEL',level:near.price,target:null,reason:`At untested ${near.type} $${fmt(near.price)} — watch for failure to ${near.type==='support'?'lose':'gain'}`,strength:'low',untested:true};
  return{sig:'NEUTRAL',type:'NONE',reason:'No DMC setup — price between levels',strength:'none'};
}

function nextMove(wC,dC){
  const wn=wC.length,dn=dC.length;
  if(wn<10||dn<10)return{dir:'UNCLEAR',reason:'Insufficient HTF data'};
  const wB=wC[wn-1].bh>wC[wn-2].bh&&wC[wn-2].bh>wC[wn-3].bh;
  const wBr=wC[wn-1].bl<wC[wn-2].bl&&wC[wn-2].bl<wC[wn-3].bl;
  const dr=dC.slice(-5);let dG=0,dL=0;
  for(let i=1;i<dr.length;i++){if(dr[i].bh>dr[i-1].bh)dG++;else dL++;}
  const dF=dC[dn-1].bh<dC[dn-2].bh&&dC[dn-2].bh>dC[dn-3].bh;
  if(wB&&dG>=3)return{dir:'UP',reason:`Weekly higher highs · Daily ${dG}/4 gaining`};
  if(wBr&&dL>=3)return{dir:'DOWN',reason:`Weekly lower lows · Daily ${dL}/4 losing`};
  if(dF&&dL>=2)return{dir:'DOWN',reason:`Daily body failed to close above last high`};
  if(wB||dG>=3)return{dir:'UP',reason:`Weekly ${wB?'bullish':'neutral'} · Daily gaining ${dG}/4`};
  if(wBr||dL>=3)return{dir:'DOWN',reason:`Weekly ${wBr?'bearish':'neutral'} · Daily losing ${dL}/4`};
  return{dir:'UNCLEAR',reason:'Mixed HTF — no clear direction'};
}

function collectLevels(wC,dC,p){
  const wL=findLevels(wC).map(l=>({...l,tf:'1W'}));
  const dL=findLevels(dC).map(l=>({...l,tf:'1D'}));
  const all=[...wL,...dL].sort((a,b)=>b.price-a.price);
  const dd=[];
  for(const l of all){if(!dd.find(d=>Math.abs(d.price-l.price)/l.price<0.005))dd.push(l);}
  return[...dd.filter(l=>l.price>p).slice(0,5),...dd.filter(l=>l.price<p).slice(-5).reverse()];
}

// RENDER
function fmt(n){return n>=1000?n.toLocaleString('en-US',{maximumFractionDigits:0}):n.toFixed(2);}

function renderTop(t){
  price=t.price;
  document.getElementById('tb-price').textContent='$'+fmt(t.price);
  const el=document.getElementById('tb-chg');
  el.style.display='';
  el.textContent=(t.change>=0?'+':'')+t.change.toFixed(2)+'%';
  el.style.background=t.change>=0?'rgba(0,230,118,.15)':'rgba(255,61,90,.15)';
  el.style.color=t.change>=0?'#00e676':'#ff3d5a';
}

function renderHero(){
  let wL=0,wS=0,activeW=0;
  TFS.forEach(tf=>{
    const r=results[tf.l]; if(!r)return;
    if(r.type!=='NONE')activeW+=tf.w;
    if(r.sig==='LONG')wL+=tf.w;
    if(r.sig==='SHORT')wS+=tf.w;
  });
  const loaded=Object.keys(results).length,diff=wL-wS;
  let sig,cls;
  if(diff>0&&loaded>=2){sig='LONG ▲';cls='long';}
  else if(diff<0&&loaded>=2){sig='SHORT ▼';cls='short';}
  else{sig='NEUTRAL';cls='neutral';}
  const hero=document.getElementById('hero');
  hero.className='hero '+cls;
  document.getElementById('hero-dir').textContent=sig;
  document.getElementById('hero-tfs').textContent=loaded+' / '+TFS.length+' TFs';
  const pct=activeW>0?Math.round(Math.max(wL,wS)/activeW*100):0;
  const confEl=document.getElementById('hero-conf');
  const confLabel=pct>=75?'HIGH':pct>=50?'MED':'LOW';
  confEl.textContent=pct+'%';
  confEl.className='hero-conf '+(pct>=75?'high':pct>=50?'med':'');
  // show label separately below
  let lblEl=document.getElementById('hero-conflbl');
  if(!lblEl){lblEl=document.createElement('div');lblEl.id='hero-conflbl';lblEl.style.cssText='font-family:IBM Plex Mono,monospace;font-size:8px;letter-spacing:.15em;text-transform:uppercase;color:#3d5068;text-align:right;margin-top:-2px';document.getElementById('hero-conf').after(lblEl);}
  lblEl.textContent=confLabel;
  const best=[...TFS].sort((a,b)=>b.w-a.w).find(tf=>results[tf.l]&&results[tf.l].type!=='NONE');
  document.getElementById('hero-reason').textContent=best?results[best.l].reason:'No active DMC setup across timeframes';
}

function renderNM(nm){
  const el=document.getElementById('nm-val');
  el.className='nm-val '+nm.dir;
  el.textContent=nm.dir==='UP'?'UP ▲':nm.dir==='DOWN'?'DOWN ▼':'UNCLEAR';
  document.getElementById('nm-sub').textContent=nm.reason;
}

function renderCards(){
  document.getElementById('tf-cards').innerHTML=TFS.map(tf=>{
    const r=results[tf.l];
    if(!r)return`<div class="tfc none"><div class="tfc-head"><span class="tfc-tf">${tf.l}</span><span class="tfc-type NONE">···</span><span class="tfc-sig WAIT" style="margin-left:auto">—</span></div><div class="tfc-reason"><span class="skel" style="width:200px;height:9px">&nbsp;</span></div></div>`;
    const cls=r.sig==='LONG'?'long':r.sig==='SHORT'?'short':'neutral';
    const tl=r.type==='FAIL_GAIN'?'FAIL TO GAIN':r.type==='FAIL_LOSE'?'FAIL TO LOSE':r.type==='AT_LEVEL'?'AT LEVEL':'NO SETUP';
    return`<div class="tfc ${cls}"><div class="tfc-head"><span class="tfc-tf">${tf.l}</span><span class="tfc-type ${r.type}">${tl}</span><span class="tfc-sig ${r.sig}" style="margin-left:auto">${r.sig}</span></div><div class="tfc-reason">${r.reason}</div>${r.level?`<div class="tfc-prices"><span class="tcp"><span class="tcp-l">LVL</span>$${fmt(r.level)}</span>${r.target?`<span class="tcp"><span class="tcp-l">TGT</span><span style="color:${r.sig==='LONG'?'#00e676':'#ff3d5a'}">$${fmt(r.target)}</span></span>`:''}${r.untested?`<span class="tcp" style="color:#ffc107">UNTESTED ●</span>`:''}</div>`:''}</div>`;
  }).join('');
}

function renderLevels(){
  if(!allLevels.length){document.getElementById('lvl-list').innerHTML='<div class="empty">No significant levels detected</div>';return;}
  document.getElementById('lvl-list').innerHTML=allLevels.map(l=>{
    const isR=l.price>price,dist=((l.price-price)/price*100).toFixed(2),cls=isR?'R':'S';
    return`<div class="lvl-item${!l.tested?' untested':''}"><span class="lvl-badge ${cls}">${isR?'RES':'SUP'}</span><div class="lvl-info"><div class="lvl-tf">${l.tf}${!l.tested?'<span class="lvl-untag">● UNTESTED</span>':''}</div></div><div class="lvl-right"><div class="lvl-price ${cls}">$${fmt(l.price)}</div><div class="lvl-dist">${dist>0?'+':''}${dist}%</div></div></div>`;
  }).join('');
}

function addLog(sig,tf,reason,type){
  if(type==='NONE')return;
  const time=new Date().toTimeString().slice(0,5);
  const cls=sig==='LONG'?'long':sig==='SHORT'?'short':'neutral';
  const col=sig==='LONG'?'#00e676':sig==='SHORT'?'#ff3d5a':'#ffc107';
  log.unshift(`<div class="log-item ${cls}"><span class="log-time">${time}</span><span class="log-txt"><strong style="color:${col}">${sig}</strong> [${tf}] ${reason.slice(0,80)}</span></div>`);
  if(log.length>20)log.pop();
  document.getElementById('log-list').innerHTML=log.join('');
}

function setStatus(s,t){
  document.getElementById('dot').className='dot '+(s==='ok'?'ok':s==='err'?'err':'');
  document.getElementById('status-txt').textContent=t;
}

// MAIN
async function run(){
  if(running)return; running=true;
  const fab=document.getElementById('fab');
  fab.classList.add('spin');
  setStatus('loading','Fetching data...');
  try{
    const td=await getPrice();
    renderTop(td);
    const kR=await Promise.allSettled(TFS.map(tf=>getCandles(tf)));
    kR.forEach((res,i)=>{
      if(res.status==='rejected'){console.warn(TFS[i].l,res.reason);return;}
      const c=res.value,a=atr(c),d=dmc(c,a);
      results[TFS[i].l]=d;
      if(d.type!=='NONE'&&d.type!=='AT_LEVEL')addLog(d.sig,TFS[i].l,d.reason,d.type);
    });
    const wK=kR[0].status==='fulfilled'?kR[0].value:null;
    const dK=kR[1].status==='fulfilled'?kR[1].value:null;
    if(wK&&dK){renderNM(nextMove(wK,dK));allLevels=collectLevels(wK,dK,td.price);}
    renderHero(); renderCards(); renderLevels();
    const now=new Date().toTimeString().slice(0,8);
    setStatus('ok','Live · '+now);
    document.getElementById('last-upd').textContent=now;
  }catch(e){
    console.error(e);
    setStatus('err',e.message.slice(0,50));
    addLog('NEUTRAL','SYS',e.message,'ERR');
  }
  running=false;
  fab.classList.remove('spin');
}
function manualRefresh(){clearTimeout(timer);run().then(schedule);}
function schedule(){timer=setTimeout(()=>run().then(schedule),REFRESH);}

window.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('tf-cards').innerHTML=TFS.map(tf=>`<div class="tfc none"><div class="tfc-head"><span class="tfc-tf">${tf.l}</span><span class="tfc-type NONE">···</span><span class="tfc-sig WAIT" style="margin-left:auto">—</span></div><div class="tfc-reason"><span class="skel" style="width:200px;height:9px">&nbsp;</span></div></div>`).join('');
  run().then(schedule);
});
</script>
